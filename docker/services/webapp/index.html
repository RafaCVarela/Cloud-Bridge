<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud-Bridge — Hub de Nuvem Comunitária</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f1f5f9;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 640px;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .subtitle { font-size: 1.1rem; color: #94a3b8; margin-bottom: 2rem; }
    .status {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-item:last-child { border-bottom: none; }
    .badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge.ok { background: #16a34a; color: white; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .link-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #f1f5f9;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    .link-btn:hover { background: rgba(255,255,255,0.2); }
    .footer { margin-top: 2rem; font-size: 0.85rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#x2601;&#xFE0F;</div>
    <h1>Cloud-Bridge</h1>
    <p class="subtitle">Hub de Nuvem Comunit&aacute;ria para Pequenas Organiza&ccedil;&otilde;es</p>

    <div class="status">
      <div class="status-item">
        <span>Servidor</span>
        <span class="badge ok">Online</span>
      </div>
      <div class="status-item">
        <span>Banco de Dados</span>
        <span class="badge ok">Conectado</span>
      </div>
      <div class="status-item">
        <span>Docker</span>
        <span class="badge ok">Rodando</span>
      </div>
      <div class="status-item">
        <span>SSL/TLS</span>
        <span class="badge ok">Ativo</span>
      </div>
    </div>

    <div class="links">
      <a href="/grafana" class="link-btn">Grafana</a>
      <a href="/prometheus" class="link-btn">Prometheus</a>
      <a href="https://github.com/RafaCVarela/Cloud-Bridge" class="link-btn">GitHub</a>
    </div>

    <div class="footer">
      <p>Cloud-Bridge v1.0 &mdash; Feito com amor em Salvador, Bahia</p>
      <p>Democratizando a nuvem para o Brasil</p>
    </div>
  </div>
</body>
</html>

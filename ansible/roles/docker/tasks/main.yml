################################################################################
# Cloud-Bridge — Role: docker
# Instala e configura Docker e Docker Compose
################################################################################
---
# tasks/main.yml

- name: Instalar dependências do Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Criar diretório para chave GPG do Docker
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Baixar chave GPG oficial do Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Adicionar repositório Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Instalar Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Habilitar e iniciar Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

- name: Adicionar usuário ubuntu ao grupo docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Configurar daemon Docker com limites de log
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Criar rede Docker para Cloud-Bridge
  community.docker.docker_network:
    name: cloud-bridge-network
    driver: bridge
